<!DOCTYPE html>
<!--
  LinkLand · E-mail de NOTIFICACAO (generico / reutilizavel)
  Ex. de uso: boas-vindas, "sua pagina foi publicada", avisos.
  Variaveis (Jinja2): name, title, message, year
  CTA opcional: cta_label, cta_url (botao envolvido por um if no corpo).
  message = texto simples; para multiplos paragrafos veja a nota no README.
-->
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{{ title }}</title>
    <style>
      body { margin: 0; padding: 0; background: #f4f4f7; }
      a { text-decoration: none; }
      @media only screen and (max-width: 600px) {
        .container { width: 100% !important; }
        .px { padding-left: 24px !important; padding-right: 24px !important; }
        .btn-link { display: block !important; }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background:#f4f4f7;">
    <!-- Preheader -->
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:#f4f4f7;">
      {{ title }}
    </div>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px; background:#ffffff; border-radius:16px; overflow:hidden; border:1px solid #ececf1;">
            <!-- Barra da marca -->
            <tr>
              <td height="6" style="height:6px; line-height:6px; font-size:0; background:#6366f1; background-image:linear-gradient(90deg,#6366f1,#8b5cf6,#d946ef);">&nbsp;</td>
            </tr>

            <!-- Logo -->
            <tr>
              <td class="px" align="left" style="padding:28px 40px 4px;">
                <span style="font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; letter-spacing:-0.5px; color:#111827;">Link<span style="color:#8b5cf6;">Land</span></span>
              </td>
            </tr>

            <!-- Conteúdo -->
            <tr>
              <td class="px" style="padding:8px 40px 0; font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#111827;">
                <h1 style="margin:16px 0 8px; font-size:24px; line-height:1.3; font-weight:700;">{{ title }}</h1>
                <p style="margin:0 0 20px; font-size:16px; line-height:1.6; color:#374151;">
                  Olá, {{ name }} 👋<br />
                  {{ message }}
                </p>
              </td>
            </tr>

            <!-- CTA opcional -->
            {% if cta_url %}
            <tr>
              <td class="px" align="left" style="padding:0 40px 8px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center" bgcolor="#6366f1" style="border-radius:10px; background:#6366f1; background-image:linear-gradient(135deg,#6366f1,#8b5cf6);">
                      <a class="btn-link" href="{{ cta_url }}" target="_blank" style="display:inline-block; padding:14px 28px; font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:16px; font-weight:600; color:#ffffff; border-radius:10px;">{{ cta_label }}</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            {% endif %}

            <!-- Footer -->
            <tr>
              <td class="px" style="padding:24px 40px 32px;">
                <div style="border-top:1px solid #ececf1; padding-top:20px;">
                  <p style="margin:0; font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; line-height:1.6; color:#9ca3af;">
                    Enviado por LinkLand · você está recebendo porque tem uma conta conosco.<br />
                    © {{ year }} LinkLand
                  </p>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
